name: Förderly Scraper v5.2

on:
  schedule:
    # Dienstag 04:00 CET (= 03:00 UTC)
    - cron: '0 3 * * 2'
  workflow_dispatch:
    inputs:
      max_programmes:
        description: 'Max Programme gesamt'
        required: false
        default: '5000'
      fast_mode:
        description: 'Fast Mode (nur Listendaten)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 lxml supabase

      - name: Run Scraper v5.2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ inputs.fast_mode }}" = "true" ]; then
            python scraper.py --fast --json-backup
          else
            python scraper.py --json-backup
          fi

      - name: Upload JSON Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foerderprogramme-backup-${{ github.run_number }}
          path: data/foerderprogramme.json
          retention-days: 30

      - name: Upload Error Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-errors-${{ github.run_number }}
          path: data/scraper_errors.csv
          retention-days: 30
          if-no-files-found: ignore
