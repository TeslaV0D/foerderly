name: Förderly Scraper

on:
  schedule:
    # Mo + Do um 4:00 CET (= 3:00 UTC)
    - cron: '0 3 * * 1,4'
  workflow_dispatch:
    inputs:
      max_programmes:
        description: 'Max Programme gesamt'
        required: false
        default: '5000'
      max_per_land:
        description: 'Max pro Bundesland'
        required: false
        default: '500'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 lxml supabase

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python scraper.py --alle --json-backup

      - name: Upload JSON Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foerderprogramme-backup-${{ github.run_number }}
          path: data/foerderprogramme.json
          retention-days: 30
